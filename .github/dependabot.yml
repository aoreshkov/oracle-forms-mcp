version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    groups:
      # Roll routine minor/patch bumps into one reviewable PR instead of many.
      minor-and-patch:
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  # Keeps the digest-pinned eclipse-temurin base image fresh (JRE CVE patches).
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
