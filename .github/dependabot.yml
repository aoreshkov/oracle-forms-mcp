version: 2
# Ecosystem ownership is split with renovate.json to avoid competing PRs:
# Dependabot owns docker + github-actions; Renovate owns gradle + gradle-wrapper.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  # Keeps the digest-pinned eclipse-temurin base image fresh (JRE CVE patches).
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
